  /subscriptions:
    get:
      tags: [ Subscriptions ]
      summary: "List subscription tariffs or admin view of user subscription"
      description: |
        Without `user_id` — all subscriptions (`SCOPE_tariff:view`).
        With `user_id` — current user's subscription (`SCOPE_tariff:view_admin`).
      parameters:
        - name: pageSize
          in: query
          schema: { type: integer, default: 10, minimum: 1 }
        - name: page
          in: query
