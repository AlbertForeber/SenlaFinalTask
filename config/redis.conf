bind 0.0.0.0
port 6379
protected-mode yes
timeout 300
tcp-keepalive 60
maxclients 500
requirepass test

save 900 1
save 300 10
save 60 500
stop-writes-on-bgsave-error yes
rdbcompression yes
dbfilename dump.rdb
dir /data

maxmemory 256mb
maxmemory-policy volatile-lru

notify-keyspace-events Ex
loglevel verbose