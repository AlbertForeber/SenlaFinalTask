# --------------- SCOOTERS ---------------
  /scooters:
    get:
      tags: [ Scooters ]
      summary: "List scooters (several modes)"
      description: |
        Supported modes:
        1) Without `longitude`/`latitude`/`radius` and without `status` — free scooters with pagination `pageSize`/`page`. `SCOPE_scooter:view`.
        2) `longitude`, `latitude`, `radius` — nearby. `SCOPE_scooter:view`.
        3) `status` — filter by status with pagination. `SCOPE_scooter:view_by_status`.
      parameters:
        - name: pageSize
          in: query
          schema: { type: integer, default: 10, minimum: 1 }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: latitude
          in: query
          schema: { type: number, format: float, minimum: -90, maximum: 90 }
        - name: longitude
          in: query
          schema: { type: number, format: float, minimum: -180, maximum: 180 }
        - name: radius
          in: query
          schema: { type: number, format: float, minimum: 0, exclusiveMinimum: true }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ScooterStatus'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScooterResponse'
        '400':
          $ref: '#/components/responses/Error400NoUnavailable'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
    post:
      tags: [ Scooters ]
      summary: "Register scooter"
      description: "`SCOPE_scooter:manage`"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScooterRequest'
      responses:
        '201':
          description: "Created"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScooterResponse'
        '400':
          $ref: '#/components/responses/Error400Full'
        '401':
